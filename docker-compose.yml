services:
  recgen:
    build:
      context: .
      dockerfile: Dockerfile
    image: recgen-inference:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility,graphics
      - HF_HOME=/cache/huggingface
    volumes:
      - ./data:/data
      - hf-cache:/cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # Override for interactive use:
    #   docker compose run --rm recgen bash
    command: >
      python -c "from recgen_inference import build_recgen;
      print(build_recgen.list_checkpoints())"

volumes:
  hf-cache:
